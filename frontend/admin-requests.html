<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Requests | Skill Certification Tracking Portal</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body data-page="admin-requests">
  <main class="page-shell">
    <div class="portal-shell">
      <aside class="sidebar">
        <div class="brand-block">
          <div class="eyebrow">Admin Portal</div>
          <h2>Skill Certification Tracking Portal</h2>
          <p id="sidebar-user" class="muted"></p>
        </div>
        <nav class="nav-links">
          <a class="nav-link" href="/admin/overview">Overview</a>
          <a class="nav-link" href="/admin/learning">Learning Hub</a>
          <a class="nav-link" href="/admin/users">Users</a>
          <a class="nav-link" href="/admin/certifications">Certifications</a>
          <a class="nav-link active" href="/admin/requests">Requests</a>
          <a class="nav-link" href="/admin/profile">Profile</a>
        </nav>
        <div class="action-row">
          <span id="session-badge" class="badge"></span>
          <button id="logout-btn" class="button secondary" type="button">Logout</button>
        </div>
      </aside>

      <section class="portal-main">
        <article class="portal-panel page-banner">
          <div>
            <div class="eyebrow">Requests</div>
            <h1 id="dashboard-title">Review Certification Requests</h1>
            <p id="dashboard-subtitle" class="muted"></p>
          </div>
          <div class="toolbar">
            <a class="button secondary" href="/admin/requests?type=add">New Certification Requests</a>
            <a class="button secondary" href="/admin/requests?type=renew">Renewal Requests</a>
            <button id="refresh-requests-btn" class="button primary" type="button">Refresh Requests</button>
          </div>
        </article>

        <section class="portal-panel">
          <div class="section-head">
            <div>
              <h2 id="request-title">Pending and Reviewed Requests</h2>
              <p class="muted">Approve or reject student add and renewal requests.</p>
            </div>
          </div>
          <div id="request-list" class="stack-list"></div>
        </section>
      </section>
    </div>
  </main>

  <dialog id="request-modal" class="modal">
    <form id="request-review-form" class="portal-panel form-stack modal-card">
      <div class="section-head">
        <h2 id="request-modal-title">Review Request</h2>
        <button class="button secondary" type="button" data-close-modal="request-modal">Close</button>
      </div>
      <input type="hidden" name="id">
      <input type="hidden" name="decision">
      <label>
        <span>Admin Note</span>
        <textarea name="adminNote" rows="4" placeholder="Optional note for approval or rejection"></textarea>
      </label>
      <div class="action-row">
        <button class="button primary" type="submit">Approve Request</button>
        <button id="request-reject-btn" class="button danger" type="button">Reject Request</button>
      </div>
      <p id="request-review-message" class="message"></p>
    </form>
  </dialog>
  <script src="/app.js"></script>
</body>
</html>
